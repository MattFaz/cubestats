services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-cubestats}:${POSTGRES_PASSWORD:-cubestats}@postgres:5432/${POSTGRES_DB:-cubestats}
      - NUXT_DATABASE_URL=postgres://${POSTGRES_USER:-cubestats}:${POSTGRES_PASSWORD:-cubestats}@postgres:5432/${POSTGRES_DB:-cubestats}
      - NUXT_AUTH_USER=${AUTH_USER:-admin}
      - NUXT_AUTH_PASS=${AUTH_PASS:-changeme}
      - NUXT_AUTH_SECRET=${AUTH_SECRET:-change-this-to-a-random-string}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cubestats}
      - POSTGRES_USER=${POSTGRES_USER:-cubestats}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-cubestats}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cubestats}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
